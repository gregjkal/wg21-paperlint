[project]
name = "paperstore"
version = "0.1.0"
description = "Storage abstraction for paperflow artifacts"
requires-python = ">=3.12"
license = {text = "BSL-1.0"}
authors = [{name = "Sergio DuBois", email = "sentientsergio@gmail.com"}]
dependencies = []

[project.scripts]
paperstore = "paperstore.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/paperstore"]
