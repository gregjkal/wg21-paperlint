[project]
name = "mailing"
version = "0.1.0"
description = "WG21 open-std.org mailing scraper + paper-source downloader"
requires-python = ">=3.12"
license = {text = "BSL-1.0"}
authors = [{name = "Sergio DuBois", email = "sentientsergio@gmail.com"}]
dependencies = [
    "paperstore",
    "httpx",
    "beautifulsoup4~=4.14.0",
]

[project.scripts]
mailing = "mailing.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mailing"]
